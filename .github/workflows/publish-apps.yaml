name: Publish App Artifacts

on:
  workflow_dispatch:
    inputs:
      apps:
        description: 'Apps to publish (JSON array, e.g. ["traefik","wg-easy"])'
        required: false
        default: ''
  push:
    branches: [master]
    paths:
      - 'apps/*/metadata.yaml'
      - 'apps/*/base/**'
      - 'apps/*/overlays/**'
      - 'apps/*/components/**'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.changes.outputs.apps }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Only need history for git diff on push events
          fetch-depth: ${{ github.event_name == 'push' && 2 || 1 }}

      - id: changes
        run: |
          # Use manual input if provided (workflow_dispatch)
          if [ -n "${{ inputs.apps }}" ]; then
            APPS="${{ inputs.apps }}"
          else
            # Get changed app directories from git diff
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'apps/' \
              | cut -d'/' -f2 | sort -u)

            # Filter to apps with metadata.yaml (all publishable apps)
            APPS="[]"
            for app in $CHANGED; do
              # Must have metadata.yaml
              if [ ! -f "apps/$app/metadata.yaml" ]; then
                continue
              fi
              APPS=$(echo "$APPS" | jq --arg a "$app" '. + [$a]')
            done
          fi

          # Use jq -c to output compact (single-line) JSON for GITHUB_OUTPUT
          echo "apps=$(echo "$APPS" | jq -c .)" >> "$GITHUB_OUTPUT"
          echo "Apps to publish: $APPS"

  publish:
    needs: detect-changes
    if: needs.detect-changes.outputs.apps != '[]'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    strategy:
      matrix:
        app: ${{ fromJSON(needs.detect-changes.outputs.apps) }}
    steps:
      - uses: actions/checkout@v6

      - uses: fluxcd/flux2/action@main

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Get app version
        id: version
        run: |
          VERSION=$(grep 'version:' apps/${{ matrix.app }}/metadata.yaml \
            | head -1 | sed 's/.*version: *//' | tr -d '"')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Push app artifact
        run: |
          flux push artifact \
            oci://ghcr.io/${{ github.repository_owner }}/marketplace/apps/${{ matrix.app }}:${{ steps.version.outputs.version }} \
            --path=./apps/${{ matrix.app }} \
            --source="$(git config --get remote.origin.url)" \
            --revision="$(git rev-parse HEAD)"

          flux push artifact \
            oci://ghcr.io/${{ github.repository_owner }}/marketplace/apps/${{ matrix.app }}:latest \
            --path=./apps/${{ matrix.app }} \
            --source="$(git config --get remote.origin.url)" \
            --revision="$(git rev-parse HEAD)"

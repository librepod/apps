apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: wg-easy
  namespace: wg-easy
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - kind: Rule
      match: Host(`wg-easy.${BASE_DOMAIN}`)
      priority: 1
      services:
        - name: wg-easy
          port: 80
          passHostHeader: true

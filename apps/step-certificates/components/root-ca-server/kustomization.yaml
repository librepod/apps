apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

namespace: step-ca

configMapGenerator:
  - name: root-ca-nginx-config
    files:
      - nginx.conf
  - name: root-ca-landing-page
    files:
      - index.html

generatorOptions:
  disableNameSuffixHash: true

resources:
  - service.yaml
  - ingressroute.yaml

# NOTE: Deployment patches moved to HelmRelease postRenderers
# The sidecar container is now added via Helm values (extraContainers)
# See: overlays/librepod/patch-helmrelease.yaml

apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

namespace: step-ca

configMapGenerator:
  # ConfigMaps are mounted by the root-ca-server sidecar defined in
  # spec.values.extraContainers in helmrelease.yaml.
  - name: root-ca-nginx-config
    files:
      - nginx.conf
  - name: root-ca-landing-page
    files:
      - index.html

generatorOptions:
  disableNameSuffixHash: true

resources:
  - service.yaml
  - ingressroute.yaml

# NOTE: patch-add-sidecar.yaml (adds nginx container to Deployment) is no longer
# used. The sidecar is now declared natively via spec.values.extraContainers in
# the HelmRelease.

apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  # ConfigMap for the init script – mounted by the custom initContainer
  # defined in spec.values.extraInitContainers in helmrelease.yaml.
  - name: step-ca-init-script
    files:
      - step-ca-init.sh=script.sh

  # ConfigMap for environment variables
  - name: step-ca-init-env
    envs:
      - init-container.env

# NOTE: patch.yaml (adds initContainer to Deployment) is no longer used.
# The initContainer is now declared natively via spec.values.extraInitContainers
# in the HelmRelease, which avoids the need to patch post-render targets.

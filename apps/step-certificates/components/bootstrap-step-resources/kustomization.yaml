apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

namespace: step-ca

resources:
  - serviceaccount.yaml
  - role.yaml
  - rolebinding.yaml
  - job.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - envs:
      - job.env
    name: cm-step-ca-bootstrap-resources
  - files:
      - step-ca-bootstrap-resources.sh=job.sh
    name: cm-step-ca-bootstrap-resources-script
    options:
      annotations:
        kustomize.toolkit.fluxcd.io/substitute: disabled

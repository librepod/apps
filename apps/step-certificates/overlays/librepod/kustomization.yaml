apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
- pvc.yaml
- helmrelease.yaml

components:
- ../../components/init-container
- ../../components/bootstrap-step-resources
- ../../components/root-ca-server

# NOTE: Image tag for the bootstrap Job is set here.
# The step-ca Deployment and initContainer image tags are controlled
# directly in helmrelease.yaml (spec.values.image.tag and extraInitContainers).
images:
  - name: cr.smallstep.com/smallstep/step-ca
    newTag: "0.29.0"

# This patch configures the HelmRelease for PVC-based storage with:
# 1. extraInitContainers - CA initialization before main container
# 2. extraContainers - root-ca-server sidecar for serving CA cert
# 3. extraVolumes - ConfigMaps and PVC for custom storage
# 4. postRenderers - JSON patches to replace default volume mounts with PVC

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: step-certificates
  namespace: step-ca
spec:
  values:
    # Add initContainer for CA initialization on PVC
    extraInitContainers:
      - name: step-ca-init
        image: cr.smallstep.com/smallstep/step-ca:0.29.0
        imagePullPolicy: IfNotPresent
        command: ["/bin/bash", "/scripts/step-ca-init.sh"]
        envFrom:
          - configMapRef:
              name: step-ca-init-env
        volumeMounts:
          - name: ca-data
            mountPath: /home/step
          - name: init-script
            mountPath: /scripts
            readOnly: true
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000

    # Add sidecar container for serving root CA
    extraContainers:
      - name: root-ca-server
        image: nginx:1.29-alpine
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
        volumeMounts:
        - name: ca-data
          mountPath: /etc/ca-certs/root_ca.crt
          subPath: certs/root_ca.crt
          readOnly: true
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        - name: landing-page
          mountPath: /usr/share/nginx/html
        - name: nginx-cache
          mountPath: /var/cache/nginx
        - name: nginx-cache
          mountPath: /var/run
        - name: nginx-cache
          mountPath: /tmp
        command: ["sh", "-c"]
        args:
          - |
            mkdir -p /tmp/client_temp /tmp/proxy_temp /tmp/fastcgi_temp /tmp/uwsgi_temp /tmp/scgi_temp
            exec nginx -g "daemon off;"
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi

    # Add extra volumes for ConfigMaps and init script
    extraVolumes:
      - name: init-script
        configMap:
          name: step-ca-init-script
          items:
            - key: step-ca-init.sh
              path: step-ca-init.sh
      - name: nginx-config
        configMap:
          name: root-ca-nginx-config
      - name: landing-page
        configMap:
          name: root-ca-landing-page
      - name: nginx-cache
        emptyDir: {}

    # Extra volume mounts for the main container (in addition to PVC)
    # Note: PVC mount is handled by postRenderers to replace default mounts
    extraVolumeMounts: []

  # Use postRenderers to replace default volume configuration
  # This patches the rendered Helm manifests after template generation
  postRenderers:
    - kustomize:
        patches:
          # Add the PVC volume to replace default configmap/secret volumes
          - target:
              kind: Deployment
              name: step-certificates
            patch: |
              - op: add
                path: /spec/template/spec/volumes/-
                value:
                  name: ca-data
                  persistentVolumeClaim:
                    claimName: step-certificates-data
              # Remove default volumes that are now on PVC
              - op: remove
                path: /spec/template/spec/volumes/0
              - op: remove
                path: /spec/template/spec/volumes/0
              - op: remove
                path: /spec/template/spec/volumes/0
          # Update main container volumeMounts to use PVC
          - target:
              kind: Deployment
              name: step-certificates
            patch: |
              # Replace the first volumeMount (certs) with ca-data at /home/step
              - op: replace
                path: /spec/template/spec/containers/0/volumeMounts/0
                value:
                  name: ca-data
                  mountPath: /home/step
              # Remove subsequent default volumeMounts (config, secrets, etc.)
              - op: remove
                path: /spec/template/spec/containers/0/volumeMounts/1
              - op: remove
                path: /spec/template/spec/containers/0/volumeMounts/1
              - op: remove
                path: /spec/template/spec/containers/0/volumeMounts/1
              - op: remove
                path: /spec/template/spec/containers/0/volumeMounts/1
              - op: remove
                path: /spec/template/spec/containers/0/volumeMounts/1

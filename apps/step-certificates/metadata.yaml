apiVersion: marketplace/v1
kind: AppDefinition
metadata:
  name: step-certificates
spec:
  displayName: "Step Certificates"
  description: "Certificate Authority (CA) and step-ca certificate management for Kubernetes"
  icon: "https://smallstep.com/assets/images/step-icon.png"
  category: "Infrastructure"
  website: "https://smallstep.com/docs/step-ca"

  version: "0.29.0"

  source:
    type: oci-kustomize
    url: "oci://ghcr.io/librepod/marketplace/apps/step-certificates"
    path: ./overlays/librepod

  params:
    required:
      - name: BASE_DOMAIN
        description: "Base domain for cluster (CA uses this for DNS SANs)"
        type: string
        example: "example.com"

  dependencies: []

  templates:
    source: |
      apiVersion: source.toolkit.fluxcd.io/v1
      kind: OCIRepository
      metadata:
        name: marketplace-step-certificates
        namespace: flux-system
        labels:
          marketplace.io/managed: "true"
          marketplace.io/app: "step-certificates"
      spec:
        interval: 10m
        url: oci://ghcr.io/librepod/marketplace/apps/step-certificates
        ref:
          tag: "0.29.0"
    release: |
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: marketplace-step-certificates
        namespace: flux-system
        labels:
          marketplace.io/managed: "true"
          marketplace.io/app: "step-certificates"
      spec:
        interval: 1h
        retryInterval: 2m
        timeout: 5m
        sourceRef:
          kind: OCIRepository
          name: marketplace-step-certificates
        path: ./overlays/librepod
        prune: true
        wait: true
        postBuild:
          substitute:
            BASE_DOMAIN: "${BASE_DOMAIN}"
    kustomization: |
      apiVersion: kustomize.config.k8s.io/v1beta1
      kind: Kustomization
      resources:
        - source.yaml
        - release.yaml

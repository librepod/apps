apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth2-forwardauth
spec:
  forwardAuth:
    address: http://oauth2-proxy.oauth2-proxy.svc.cluster.local/oauth2/auth
    trustForwardHeader: true
    # HINT: Use the whoami web app to view all the headers returned from the oauth2-proxy
    authResponseHeadersRegex:
      - ^X-Auth-
      - ^X-Forwarded-
    authResponseHeaders:
      - Authorization

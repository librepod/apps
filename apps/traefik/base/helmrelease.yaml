apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chartRef:
    kind: OCIRepository
    name: traefik
  values:
    ports:
      web:
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
      # WireGuard entrypoint removed — wg-easy now uses hostNetwork and
      # binds port 51820 directly on the host, so Traefik no longer needs
      # to proxy UDP traffic for WireGuard.

    providers:
      kubernetesCRD:
        allowExternalNameServices: true
        allowCrossNamespace: true

    priorityClassName: "system-cluster-critical"

    tolerations:
      - key: "CriticalAddonsOnly"
        operator: "Exists"
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"
      - key: "node-role.kubernetes.io/master"
        operator: "Exists"
        effect: "NoSchedule"

    logs:
      access:
        enabled: true

apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

labels:
- includeSelectors: true
  pairs:
    app.kubernetes.io/name: traefik
    app.kubernetes.io/component: casdoor-auth

configMapGenerator:
- name: traefik-casdoor-auth
  envs:
  - config.env

secretGenerator:
- name: traefik-casdoor-auth
  envs:
  - secret.env

resources:
- deployment.yaml
- service.yaml
- middleware.yaml

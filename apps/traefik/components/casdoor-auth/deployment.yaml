apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik-casdoor-auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: casdoor-auth
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/component: casdoor-auth
    spec:
      containers:
        - name: casdoor-auth
          image: casbin/traefik-casdoor-auth
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: traefik-casdoor-auth
            - secretRef:
                name: traefik-casdoor-auth
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            failureThreshold: 3
            timeoutSeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 3
            failureThreshold: 3
            timeoutSeconds: 5
            periodSeconds: 10
          startupProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 0
            failureThreshold: 30
            timeoutSeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

components:
- ../../components/postgres

resources:
- ../../base
- ingressroute.yaml

namespace: litellm

images:
- name: litellm/litellm
  newTag: v1.80.0-stable.opus-4-6
- name: postgres
  newTag: 16-alpine


patches:
- path: patch-storage.yaml
  target:
    kind: PersistentVolumeClaim

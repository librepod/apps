apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

components:
- ../../components/postgres
- ../../components/gluetun

resources:
- ../../base
- ingressroute.yaml

namespace: litellm

images:
- name: litellm/litellm
  newTag: v1.81.9-stable.patch.1
- name: postgres
  newTag: 16-alpine


patches:
- path: patch-storage.yaml
  target:
    kind: PersistentVolumeClaim

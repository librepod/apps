apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
spec:
  replicas: 1
  strategy:
    type: Recreate
  template:
    spec:
      containers:
        - name: litellm
          image: docker.litellm.ai/berriai/litellm
          imagePullPolicy: IfNotPresent
          args:
            - "--config"
            - "/app/proxy_server_config.yaml"
          envFrom:
            - configMapRef:
                name: litellm
            - secretRef:
                name: litellm-secrets
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 0
            failureThreshold: 30
            timeoutSeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /app/proxy_server_config.yaml
              subPath: config.yaml
            - name: data
              mountPath: /app/data
      volumes:
        - name: config
          configMap:
            name: litellm-config
        - name: data
          persistentVolumeClaim:
            claimName: litellm-data

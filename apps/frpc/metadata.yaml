apiVersion: marketplace/v1
kind: AppDefinition
metadata:
  name: frpc
spec:
  displayName: "FRP Client"
  description: "Fast Reverse Proxy client for remote access to cluster services and host SSH"
  icon: "https://raw.githubusercontent.com/fatedier/frp/main/doc/pic/frp.png"
  category: "Networking"
  website: "https://github.com/fatedier/frp"

  version: "1.0.0"
  appVersion: "0.65.0"

  source:
    type: oci-kustomize
    url: "oci://ghcr.io/librepod/marketplace/apps/frpc"
    path: ./overlays/librepod

  params:
    required:
      - name: FRP_SERVER_ADDR
        description: "FRP server address (IP or hostname)"
        type: string
        example: "203.0.113.10"
    optional:
      - name: FRP_SERVER_PORT
        description: "FRP server port"
        type: integer
        default: "7000"
      - name: FRP_SSH_REMOTE_PORT
        description: "Remote port for SSH tunnel proxy"
        type: integer
        default: "6000"

  secrets:
    - name: FRP_AUTH_TOKEN
      description: "Authentication token matching the FRP server configuration"
      required: true

  dependencies:
    required:
      - kind: Kubernetes
        description: "Kubernetes cluster with CoreDNS"
      - kind: IngressController
        description: "Traefik (provided by traefik app)"
      - kind: AuthProxy
        description: "oauth2-proxy (provided by oauth2-proxy app)"

  templates:
    source: |
      apiVersion: source.toolkit.fluxcd.io/v1
      kind: OCIRepository
      metadata:
        name: frpc
        namespace: flux-system
        labels:
          marketplace.io/managed: "true"
          marketplace.io/app: "frpc"
          marketplace.io/version: "1.0.0"
      spec:
        interval: 10m
        url: oci://ghcr.io/librepod/marketplace/apps/frpc
        ref:
          tag: "1.0.0"
    release: |
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: frpc
        namespace: flux-system
        labels:
          marketplace.io/managed: "true"
          marketplace.io/app: "frpc"
          marketplace.io/version: "1.0.0"
      spec:
        dependsOn:
          - name: traefik
          - name: oauth2-proxy
        interval: 1h
        retryInterval: 2m
        timeout: 5m
        sourceRef:
          kind: OCIRepository
          name: frpc
        path: ./overlays/librepod
        prune: true
        wait: false
        postBuild:
          substitute:
            FRP_SERVER_ADDR: "${FRP_SERVER_ADDR}"
            FRP_SERVER_PORT: "${FRP_SERVER_PORT}"
            FRP_SSH_REMOTE_PORT: "${FRP_SSH_REMOTE_PORT}"
          substituteFrom:
            - kind: Secret
              name: frpc-config
    secret: |
      apiVersion: v1
      kind: Secret
      metadata:
        name: frpc-config
        namespace: flux-system
      type: Opaque
      stringData:
        FRP_AUTH_TOKEN: "${FRP_AUTH_TOKEN}"
    kustomization: |
      apiVersion: kustomize.config.k8s.io/v1beta1
      kind: Kustomization
      resources:
        - source.yaml
        - release.yaml
        - secret.yaml

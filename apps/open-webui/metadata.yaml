apiVersion: marketplace/v1
kind: AppDefinition
metadata:
  name: open-webui
spec:
  displayName: "Open WebUI"
  description: "Self-hosted AI chat interface with Ollama integration"
  icon: "https://raw.githubusercontent.com/open-webui/open-webui/main/svelte/src/assets/logo.png"
  category: "AI"
  website: "https://github.com/open-webui/open-webui"

  version: "12.10.0"
  appVersion: "12.10.0"

  source:
    type: oci-helm
    url: "oci://ghcr.io/librepod/marketplace/apps/open-webui"
    chartName: open-webui
    chartVersion: "12.10.0"

  params:
    required:
      - name: BASE_DOMAIN
        description: "Base domain (app will be at open-webui.BASE_DOMAIN)"
        type: string
        example: "example.com"
    optional:
      - name: OLLAMA_ENABLED
        description: "Enable Ollama integration for local LLMs"
        type: boolean
        default: false

  secrets:
    - name: OAUTH_CLIENT_SECRET
      description: "OAuth2 client secret for LibrePod SSO integration"
      required: false

  dependencies:
    required:
      - kind: IngressController
        description: "Traefik (provided by bootstrap)"

  templates:
    source: |
      apiVersion: source.toolkit.fluxcd.io/v1
      kind: HelmRepository
      metadata:
        name: marketplace-open-webui
        namespace: flux-system
        labels:
          marketplace.io/managed: "true"
          marketplace.io/app: "open-webui"
          marketplace.io/version: "12.10.0"
      spec:
        interval: 12h
        url: oci://ghcr.io/librepod/marketplace/apps/open-webui
    release: |
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: marketplace-open-webui
        namespace: flux-system
        labels:
          marketplace.io/managed: "true"
          marketplace.io/app: "open-webui"
          marketplace.io/version: "12.10.0"
      spec:
        interval: 1h
        releaseName: open-webui
        targetNamespace: open-webui
        chart:
          spec:
            chart: open-webui
            version: "12.10.0"
            sourceRef:
              kind: HelmRepository
              name: marketplace-open-webui
            interval: 12h
        values:
          persistence:
            enabled: true
            existingClaim: "open-webui-pvc"
        postBuild:
          substitute:
            BASE_DOMAIN: "${BASE_DOMAIN}"
          substituteFrom:
            - kind: Secret
              name: open-webui-config
    secret: |
      apiVersion: v1
      kind: Secret
      metadata:
        name: open-webui-config
        namespace: flux-system
        labels:
          marketplace.io/managed: "true"
          marketplace.io/app: "open-webui"
      type: Opaque
      stringData:
        OAUTH_CLIENT_SECRET: "${OAUTH_CLIENT_SECRET}"

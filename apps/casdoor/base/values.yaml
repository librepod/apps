# There is a bug with user permissions to write to the default sqlite database
# location: https://github.com/casdoor/casdoor-helm/issues/42
# Hence we have to ovewrite config with our custom path to store the database,
# i.e. dataSourceName:
config: |
  appname = casdoor
  httpport = 8000
  runmode = release
  SessionOn = true
  copyrequestbody = true
  driverName = sqlite
  dataSourceName = file:/data/casdoor.db?cache=shared
  dbName = casdoor
  redisEndpoint =
  defaultStorageProvider =
  isCloudIntranet = false
  authState = "casdoor"
  socks5Proxy = ""
  verificationCodeTimeout = 10
  initScore = 0
  logPostOnly = true
  origin =
  enableGzip = true

extraVolumeMounts: 
- mountPath: /data
  name: data

extraVolumes: 
- name: data
  persistentVolumeClaim:
      claimName: casdoor-data

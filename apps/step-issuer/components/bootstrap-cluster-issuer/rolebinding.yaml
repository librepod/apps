# ClusterRoleBinding for StepClusterIssuer creation (cluster-scoped)
# Bound to the step-issuer chart's ServiceAccount so the initContainer
# has permission to apply the StepClusterIssuer resource.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: step-ca-bootstrap-cluster-issuer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: step-ca-bootstrap-cluster-issuer
subjects:
  - kind: ServiceAccount
    name: step-issuer
    namespace: step-ca
---
# RoleBinding for Secret access (namespace-scoped)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: step-ca-bootstrap-cluster-issuer
  namespace: step-ca
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: step-ca-bootstrap-cluster-issuer
subjects:
  - kind: ServiceAccount
    name: step-issuer
    namespace: step-ca

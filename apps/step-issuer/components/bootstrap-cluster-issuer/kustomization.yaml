apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

namespace: step-ca

resources:
  - role.yaml
  - rolebinding.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - envs:
      - job.env
    name: cm-step-ca-bootstrap-cluster-issuer
  - files:
      - step-ca-bootstrap-cluster-issuer.sh=job.sh
    name: cm-step-ca-bootstrap-cluster-issuer-script

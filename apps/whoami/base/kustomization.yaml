apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: whoami

labels:
- includeSelectors: true
  includeTemplates: true
  pairs:
    app.kubernetes.io/name: whoami

configMapGenerator:
- name: whoami
  envs:
  - whoami.env

resources:
- namespace.yaml
- service.yaml
- deployment.yaml

apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: gogs
spec:
  entryPoints:
  - web
  - websecure
  routes:
  # /flux/cluster-config path is used by FluxCD for git repo reconcilation — must bypass oauth2
  - kind: Rule
    match: Host(`git.${BASE_DOMAIN}`) && PathPrefix(`/flux`)
    priority: 100
    services:
    - name: gogs
      port: 80
  - kind: Rule
    match: Host(`git.${BASE_DOMAIN}`)
    priority: 1
    middlewares:
    - name: oauth2-errors
      namespace: oauth2-proxy
    - name: oauth2-forwardauth
      namespace: oauth2-proxy
    services:
    - name: gogs
      port: 80

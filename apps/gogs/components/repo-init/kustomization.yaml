apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

namespace: gogs

# Patches to add restore initContainer to Gogs deployment
patches:
  - path: deployment-patch.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - files:
      - gogs-init.zip
    name: gogs-init-backup

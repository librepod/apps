apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

namespace: gogs

resources:
  - serviceaccount.yaml
  - role.yaml
  - rolebinding.yaml
  - job.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - envs:
      - job.env
    name: cm-gogs-repo-init
  - files:
      - gogs-repo-init.sh=init.sh
    name: cm-gogs-repo-init-script
    options:
      annotations:
        kustomize.toolkit.fluxcd.io/substitute: disabled

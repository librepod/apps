apiVersion: apps/v1
kind: Deployment
metadata:
  name: gogs
spec:
  template:
    spec:
      initContainers:
        - name: restore-from-backup
          image: gogs/gogs
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          command:
            - /bin/sh
            - -c
            - |
              set -e

              MARKER_FILE="/data/.restore-complete"
              BACKUP_FILE="/data/gogs-init.zip"

              # Idempotency check - if marker exists, skip restore
              if [ -f "$MARKER_FILE" ]; then
                echo "Restore already completed (marker found), skipping."
                exit 0
              fi

              # Wait for postgres to be ready
              # echo "Waiting for postgres at gogs-postgres:5432..."
              # until nc -z gogs-postgres 5432; do
              #   echo "Postgres not ready, waiting..."
              #   sleep 2
              # done
              # echo "Postgres is ready."

              # Check if this is a fresh instance (no existing repositories)
              # Skip restore if data already exists to avoid overwriting
              if [ -d "/data/git/gogs-repositories" ] && [ "$(ls -A /data/git/gogs-repositories 2>/dev/null)" ]; then
                echo "Existing repositories found, skipping restore."
                touch "$MARKER_FILE"
                exit 0
              fi

              # Set TMPDIR to same filesystem to avoid cross-device link errors
              mkdir -p /data/tmp
              export TMPDIR=/data/tmp

              # Run restore
              echo "Restoring Gogs from backup..."
              cd /app/gogs
              ./gogs restore --from "$BACKUP_FILE" --config /data/gogs/conf/app.ini

              # Create marker file to indicate restore completed
              touch "$MARKER_FILE"
              echo "Restore completed successfully."
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /data/gogs/conf/app.ini
              subPath: app.ini
            - name: backup
              mountPath: /data/gogs-init.zip
              subPath: gogs-init.zip
              readOnly: true
      volumes:
        - name: backup
          configMap:
            name: gogs-init-backup

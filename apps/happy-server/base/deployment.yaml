apiVersion: apps/v1
kind: Deployment
metadata:
  name: happy-server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: happy-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: happy-server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      initContainers:
        - name: prisma-migrate
          image: ghcr.io/denysvitali/happy-server
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: happy-server
            - secretRef:
                name: happy-server-secret
          command:
            - sh
            - -c
            - cd /repo/packages/happy-server && npx prisma migrate deploy
      containers:
        - name: happy-server
          image: ghcr.io/denysvitali/happy-server
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3005
            - name: metrics
              containerPort: 9090
          envFrom:
            - configMapRef:
                name: happy-server
            - secretRef:
                name: happy-server-secret
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

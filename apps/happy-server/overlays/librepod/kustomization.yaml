# Happy server overlay for LibrePod deployment
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
- ../../components/redis
- ../../components/postgres
- ../../components/minio
- ingressroute.yaml

secretGenerator:
- name: happy-server-secret
  type: Opaque
  behavior: create
  envs:
  - happy-server-secret.env

patches:
- path: patch-prometheus-annotations.yaml
- path: patch-metrics-port.yaml

images:
- name: ghcr.io/denysvitali/happy-server
  newTag: latest
- name: postgres
  newTag: "16-alpine"
- name: redis
  newTag: "7-alpine"
- name: minio/minio
  newTag: "latest"

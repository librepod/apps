# Happy server overlay for LibrePod deployment
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: happy-server

resources:
- ../../base
- ../../components/redis
- ../../components/postgres
- ../../components/minio
- ingressroute.yaml

generatorOptions:
  disableNameSuffixHash: true

secretGenerator:
- name: happy-server-secret
  type: Opaque
  behavior: create
  literals:
  - HANDY_MASTER_SECRET=change-me-to-a-secure-random-value
  - S3_ACCESS_KEY=your-s3-access-key
  - S3_SECRET_KEY=your-s3-secret-key

images:
- name: ghcr.io/denysvitali/happy-server
  newTag: latest
- name: postgres
  newTag: "16-alpine"
- name: redis
  newTag: "7-alpine"
- name: minio/minio
  newTag: "latest"

apiVersion: marketplace/v1
kind: AppDefinition
metadata:
  name: baikal
spec:
  displayName: "Baïkal"
  description: "Lightweight CalDAV/CardDAV server for calendar and contacts"
  icon: "https://raw.githubusercontent.com/sabre-io/Baikal/master/core/html/baikal-logo.png"
  category: "Productivity"
  website: "https://github.com/sabre-io/Baikal"

  version: "0.11.1-nginx"

  source:
    type: oci-kustomize
    url: "oci://ghcr.io/librepod/marketplace/apps/baikal"
    path: ./overlays/librepod

  params:
    required:
      - name: BASE_DOMAIN
        description: "Base domain (app will be at baikal.BASE_DOMAIN)"
        type: string
        example: "example.com"

  secrets: []

  dependencies:
    required:
      - kind: IngressController
        description: "Traefik (provided by bootstrap)"
      - kind: StorageClass
        description: "nfs-client (provided by bootstrap)"

  templates:
    source: |
      apiVersion: source.toolkit.fluxcd.io/v1
      kind: OCIRepository
      metadata:
        name: marketplace-baikal
        namespace: flux-system
        labels:
          marketplace.io/managed: "true"
          marketplace.io/app: "baikal"
      spec:
        interval: 10m
        url: oci://ghcr.io/librepod/marketplace/apps/baikal
        ref:
          tag: "0.11.1-nginx"
    release: |
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: marketplace-baikal
        namespace: flux-system
        labels:
          marketplace.io/managed: "true"
          marketplace.io/app: "baikal"
      spec:
        interval: 10m
        targetNamespace: baikal
        sourceRef:
          kind: OCIRepository
          name: marketplace-baikal
        path: ./overlays/librepod
        prune: true
        wait: true
        postBuild:
          substitute:
            BASE_DOMAIN: "${BASE_DOMAIN}"
    kustomization: |
      apiVersion: kustomize.config.k8s.io/v1beta1
      kind: Kustomization
      resources:
        - source.yaml
        - release.yaml

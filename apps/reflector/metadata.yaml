apiVersion: marketplace/v1
kind: AppDefinition
metadata:
  name: reflector
spec:
  displayName: "Reflector"
  description: "Kubernetes operator that reflects Kubernetes resources across namespaces and configmaps/secrets for auto-reload"
  icon: "https://raw.githubusercontent.com/emberstack/kubernetes-reflector/main/docs/assets/logo.png"
  category: "Infrastructure"
  website: "https://github.com/emberstack/kubernetes-reflector"

  version: "1.0.0"
  appVersion: "10.0.0"

  source:
    type: oci-kustomize
    url: "oci://ghcr.io/librepod/marketplace/apps/reflector"
    path: ./overlays/librepod

  params:
    required: []

  dependencies: []

  templates:
    source: |
      apiVersion: source.toolkit.fluxcd.io/v1beta2
      kind: OCIRepository
      metadata:
        name: marketplace-reflector
        namespace: flux-system
        labels:
          marketplace.io/managed: "true"
          marketplace.io/app: "reflector"
          marketplace.io/version: "1.0.0"
      spec:
        interval: 10m
        url: oci://ghcr.io/librepod/marketplace/apps/reflector
        ref:
          tag: "1.0.0"
    release: |
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: marketplace-reflector
        namespace: flux-system
        labels:
          marketplace.io/managed: "true"
          marketplace.io/app: "reflector"
          marketplace.io/version: "1.0.0"
      spec:
        interval: 1h
        retryInterval: 2m
        timeout: 5m
        sourceRef:
          kind: OCIRepository
          name: marketplace-reflector
        path: ./overlays/librepod
        prune: true
        wait: true
    kustomization: |
      apiVersion: kustomize.config.k8s.io/v1beta1
      kind: Kustomization
      resources:
        - source.yaml
        - release.yaml

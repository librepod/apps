apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reflector
spec:
  releaseName: reflector
  chart:
    spec:
      chart: reflector
      version: "9.2.1"
      sourceRef:
        kind: HelmRepository
        name: emberstack
  interval: 12h
  install:
    remediation:
      retries: 3
  # Default values
  # https://github.com/emberstack/kubernetes-reflector/blob/main/src/helm/values.yaml
  values: {}

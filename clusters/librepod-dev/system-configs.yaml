---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: system-configs
  namespace: flux-system
spec:
  dependsOn:
    - name: system-apps
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  sourceRef:
    kind: OCIRepository
    name: librepod-bootstrap
  path: ./infrastructure/system-configs
  prune: true
  patches: []
  postBuild:
    substitute:
      BASE_DOMAIN: "librepod.dev"

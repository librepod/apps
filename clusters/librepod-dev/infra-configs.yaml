---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-configs
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-apps
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  sourceRef:
    kind: OCIRepository
    name: librepod-marketplace
  path: ./infrastructure/configs
  prune: true
  patches: []
  postBuild:
    substitute:
      BASE_DOMAIN: "librepod.dev"

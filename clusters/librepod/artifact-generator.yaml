---
apiVersion: source.extensions.fluxcd.io/v1beta1
kind: ArtifactGenerator
metadata:
  name: flux-system-artifact-generator
  namespace: flux-system
spec:
  sources:
    - alias: monorepo
      kind: GitRepository
      name: flux-system
  artifacts:
    - name: infrastructure
      originRevision: "@monorepo"
      copy:
        - from: "@monorepo/infrastructure/**"
          to: "@artifact/"
    - name: librepod-system
      originRevision: "@monorepo"
      copy:
        - from: "@monorepo/apps/casdoor"
          to: "@artifact/librepod-system/"
    - name: apps
      originRevision: "@monorepo"
      copy:
        - from: "@monorepo/apps/**"
          to: "@artifact/apps/"

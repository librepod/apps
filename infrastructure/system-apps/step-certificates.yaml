apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: step-certificates
  namespace: flux-system
spec:
  interval: 10m
  url: oci://ghcr.io/librepod/marketplace/apps/step-certificates
  ref:
    tag: "0.29.1"
  verify:
    provider: cosign
    secretRef:
      name: cosign-pub
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: step-certificates
  namespace: flux-system
spec:
  dependsOn:
    - name: storage
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  sourceRef:
    kind: OCIRepository
    name: step-certificates
  path: ./overlays/librepod
  prune: true
  wait: true
  postBuild:
    substitute:
      BASE_DOMAIN: "${BASE_DOMAIN}"

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-config-source
  namespace: flux-system
spec:
  dependsOn:
    - name: gogs
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: librepod-apps
  path: ./infrastructure/cluster-config
  prune: true
  wait: true

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: casdoor
  namespace: flux-sysem
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  sourceRef:
    kind: ExternalArtifact
    name: librepod-system
  path: ./casdoor/overlays/librepod
  prune: true
  wait: true

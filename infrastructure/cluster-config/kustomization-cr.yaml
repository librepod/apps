# NOTE: Named "cluster-config-apps" (not "cluster-config") to avoid collision
# with the outer Flux Kustomization that applies this file. Both the outer
# Kustomization (from clusters/<env>/cluster-config.yaml) and this inner one
# live in namespace flux-system. A shared name causes Flux to prune the
# GitRepository and this Kustomization during garbage collection, because the
# inner Kustomization sees them in its inventory but not in the Gogs source.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-config-apps
  namespace: flux-system
spec:
  interval: 1m
  sourceRef:
    kind: GitRepository
    name: cluster-config
  path: ./
  prune: true
  wait: true
